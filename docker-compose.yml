services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sbrtask}
      POSTGRES_USER: ${POSTGRES_USER:-sbrtask}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sbrtask_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sbrtask}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-sbrtask}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sbrtask}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://sbrtask.laboratoriosobral.com}
      LDAP_URL: ${LDAP_URL:-ldap://192.86.221.218:389}
      LDAP_DOMAIN: ${LDAP_DOMAIN:-labsobralnet.ind}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-DC=labsobralnet,DC=ind}
      LDAP_SERVICE_DN: ${LDAP_SERVICE_DN}
      LDAP_SERVICE_PASS: ${LDAP_SERVICE_PASS}
      COMPANY_IPS: ${COMPANY_IPS:-}
    ports:
      - "127.0.0.1:3004:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sbrtask_net
    volumes:
      - backend_logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://sbrtask.laboratoriosobral.com/api}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8084:80"
    networks:
      - sbrtask_net

volumes:
  postgres_data:
  backend_logs:

networks:
  sbrtask_net:
    driver: bridge

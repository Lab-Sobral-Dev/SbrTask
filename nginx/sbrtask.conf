# Deploy to: /etc/nginx/sites-available/sbrtask.conf
# Enable:    ln -s /etc/nginx/sites-available/sbrtask.conf /etc/nginx/sites-enabled/
# Test:      nginx -t && systemctl reload nginx

upstream sbrtask_backend {
    server 127.0.0.1:3001;
}

upstream sbrtask_frontend {
    server 127.0.0.1:8080;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name sbrtask.laboratoriosobral.com;

    # Certbot ACME challenge (required before running certbot --nginx)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sbrtask.laboratoriosobral.com;

    # ── SSL — managed by Certbot ──────────────────────────────────────────────
    # Run once on VPS: certbot --nginx -d sbrtask.laboratoriosobral.com
    # Certbot will fill and manage these paths automatically:
    ssl_certificate     /etc/letsencrypt/live/sbrtask.laboratoriosobral.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sbrtask.laboratoriosobral.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-XSS-Protection          "1; mode=block"                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"    always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Real IP forwarding ────────────────────────────────────────────────────
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host              $host;

    # ── Backend REST API ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://sbrtask_backend;
        proxy_read_timeout 60s;
    }

    # ── Socket.IO (WebSocket upgrade) ─────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://sbrtask_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # ── Frontend SPA ──────────────────────────────────────────────────────────
    location / {
        proxy_pass http://sbrtask_frontend;
    }
}

# Deploy to: /etc/nginx/sites-available/sbrtask.conf
# Enable:    ln -s /etc/nginx/sites-available/sbrtask.conf /etc/nginx/sites-enabled/sbrtask.conf
# SSL:       certbot --nginx -d sbrtask.laboratoriosobral.com
# Test:      nginx -t && systemctl reload nginx

server {
    server_name sbrtask.laboratoriosobral.com;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                       always;
    add_header X-Content-Type-Options "nosniff"                          always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"  always;

    # ── Real IP ───────────────────────────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Backend REST API ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:3004;
        proxy_read_timeout 60s;
    }

    # ── Socket.IO (WebSocket) ─────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # ── Frontend SPA ──────────────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8084;
    }

    listen 80;
}

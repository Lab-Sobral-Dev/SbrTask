<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes sbt-float {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-4px); }
      }
      @keyframes sbt-check-draw {
        from { stroke-dashoffset: 52; opacity: 0; }
        to   { stroke-dashoffset: 0;  opacity: 1; }
      }
      @keyframes sbt-ring-pulse {
        0%, 100% { opacity: 0.75; }
        50%       { opacity: 1; }
      }
      .sbt-float {
        animation: sbt-float 3.2s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center;
      }
      .sbt-check {
        stroke-dasharray: 52;
        stroke-dashoffset: 52;
        opacity: 0;
        animation: sbt-check-draw 0.65s 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
      }
      .sbt-ring {
        animation: sbt-ring-pulse 2.1s 1.1s ease-in-out infinite;
      }
    </style>
    <linearGradient id="sbt-fav-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2d47"/>
      <stop offset="100%" stop-color="#0d1627"/>
    </linearGradient>
  </defs>

  <!-- Fundo arredondado (squircle) -->
  <rect width="80" height="80" rx="18" fill="#0f172a"/>

  <g class="sbt-float">
    <!-- Sombra do card -->
    <rect x="15" y="15" width="52" height="58" rx="9" fill="rgba(0,0,0,0.45)"/>
    <!-- Corpo do card -->
    <rect x="13" y="11" width="52" height="58" rx="9" fill="url(#sbt-fav-card)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <!-- Header laranja -->
    <rect x="13" y="11" width="52" height="18" rx="9" fill="#e76327"/>
    <rect x="13" y="21" width="52" height="8" fill="#e76327"/>
    <!-- Dots do header -->
    <circle cx="22" cy="20" r="2.5" fill="rgba(255,255,255,0.85)"/>
    <circle cx="29" cy="20" r="2.5" fill="rgba(255,255,255,0.5)"/>
    <circle cx="36" cy="20" r="2.5" fill="rgba(255,255,255,0.28)"/>
    <!-- Linha divisória -->
    <line x1="13" y1="29" x2="65" y2="29" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    <!-- Row 1 — concluída -->
    <circle class="sbt-ring" cx="23" cy="41" r="6" fill="rgba(231,99,39,0.22)" stroke="rgba(231,99,39,0.9)" stroke-width="1.8"/>
    <path class="sbt-check" d="M20 41 L22.8 43.8 L27.5 37.5"
          stroke="#e76327" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="34" y="38.5" width="22" height="5" rx="2.5" fill="rgba(255,255,255,0.38)"/>
    <!-- Row 2 — andamento -->
    <circle cx="23" cy="53" r="6" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="1.6"/>
    <path d="M23 47 A6 6 0 0 1 29 53" stroke="rgba(255,255,255,0.6)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <rect x="34" y="50.5" width="16" height="5" rx="2.5" fill="rgba(255,255,255,0.2)"/>
    <!-- Row 3 — pendente -->
    <circle cx="23" cy="63" r="6" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="1.4"/>
    <rect x="34" y="60.5" width="11" height="5" rx="2.5" fill="rgba(255,255,255,0.11)"/>
  </g>
</svg>

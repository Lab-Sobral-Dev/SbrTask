server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all unknown paths return index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html nunca cacheado — garante que o SPA atualizado seja sempre entregue
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Assets com hash de conteúdo — cache agressivo é seguro
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SVG com cache moderado (favicon.svg não tem hash no nome)
    location ~* \.svg$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
